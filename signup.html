<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - CarXpert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/auth.css" />
</head>
<body>
  <div class="cursor-dot"></div>
  <div class="cursor-outline"></div>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="assets/images/logo.png" alt="CarXpert" />
      </div>
      <h1 class="auth-title">Create account</h1>
      <p class="auth-subtitle">Join CarXpert and get started today</p>
      <form class="auth-form">
        <div class="auth-field">
          <label for="name">Full name</label>
          <input id="name" type="text" placeholder="John Doe" required />
        </div>
        <div class="auth-field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" required />
        </div>
        <div class="auth-field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Create a password" required />
        </div>
        <div class="auth-field">
          <label for="confirm">Confirm password</label>
          <input id="confirm" type="password" placeholder="Confirm your password" required />
        </div>
        <button type="submit" class="auth-btn">Create Account</button>
      </form>
      <div class="auth-divider">
        <span>or continue with</span>
      </div>
      <div class="auth-social">
        <button class="auth-social-btn"><i class="fab fa-google"></i> Google</button>
        <button class="auth-social-btn"><i class="fab fa-apple"></i> Apple</button>
      </div>
      <p class="auth-footer">
        Already have an account? <a href="signin.html">Sign in</a>
      </p>
    </div>
  </div>
</body>
</html>
